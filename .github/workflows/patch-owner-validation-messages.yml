name: Patch owner validation messages

on:
  push:
    paths:
      - '.github/workflows/patch-owner-validation-messages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Improve owner validation messages and numeric apartment validation
        run: |
          python3 - <<'PY'
          from pathlib import Path

          api = Path('bm-api/app/Http/Controllers/Api/OwnerController.php')
          s = api.read_text()
          old = """    private function validateOwner(Request $request): array
    {
        return $request->validate([
            'name' => ['required', 'string', 'max:255'],
            'national_id' => ['required', 'string', 'max:50'],
            'phone' => ['nullable', 'string', 'max:50'],
            'email' => ['nullable', 'email', 'max:255'],
            'notes' => ['nullable', 'string'],
            'apartments' => ['required', 'array', 'min:1'],
            'apartments.*.number' => ['required', 'string', 'max:50'],
            'apartments.*.floor' => ['nullable', 'string', 'max:50'],
        ]);
    }
"""
          new = """    private function validateOwner(Request $request): array
    {
        return $request->validate([
            'name' => ['required', 'string', 'max:255'],
            'national_id' => ['required', 'string', 'max:50'],
            'phone' => ['nullable', 'string', 'max:50'],
            'email' => ['nullable', 'email', 'max:255'],
            'notes' => ['nullable', 'string'],
            'apartments' => ['required', 'array', 'min:1'],
            'apartments.*.number' => ['required', 'string', 'regex:/^[0-9]+$/', 'max:50'],
            'apartments.*.floor' => ['nullable', 'string', 'max:50'],
        ], [
            'name.required' => 'اسم المالك مطلوب.',
            'national_id.required' => 'رقم الهوية أو اسم الدخول مطلوب.',
            'email.email' => 'صيغة البريد الإلكتروني غير صحيحة.',
            'apartments.required' => 'رقم الشقة مطلوب.',
            'apartments.array' => 'رقم الشقة مطلوب.',
            'apartments.min' => 'أدخل رقم شقة واحد على الأقل.',
            'apartments.*.number.required' => 'رقم الشقة مطلوب.',
            'apartments.*.number.regex' => 'رقم الشقة يجب أن يكون أرقام فقط.',
        ]);
    }
"""
          if old not in s:
              if "'apartments.*.number.regex'" not in s:
                  raise SystemExit('OwnerController validateOwner block not found')
          else:
              api.write_text(s.replace(old, new, 1))

          app = Path('bm-mobile/App.js')
          js = app.read_text()
          old_request = "if (!response.ok) throw new Error(data?.message || Object.values(data?.errors || {})?.flat()?.[0] || 'حدث خطأ غير متوقع');"
          new_request = "if (!response.ok) throw new Error(Object.values(data?.errors || {})?.flat()?.[0] || data?.message || 'حدث خطأ غير متوقع');"
          if old_request in js:
              js = js.replace(old_request, new_request, 1)
          app.write_text(js)
          PY

      - name: Remove temporary workflow
        run: rm -f .github/workflows/patch-owner-validation-messages.yml

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bm-api/app/Http/Controllers/Api/OwnerController.php bm-mobile/App.js .github/workflows/patch-owner-validation-messages.yml
          git commit -m "Improve owner apartment validation messages" || exit 0
          git push

# trigger: 2
