name: Deploy BM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BM_SSH_HOST }}
          username: ${{ secrets.BM_SSH_USER }}
          key: ${{ secrets.BM_SSH_PRIVATE_KEY }}
          port: "${{ secrets.BM_SSH_PORT }}"
          script: |
            set -e
            cd /mnt/home-storage/home/pmsa/apps/bm
            git fetch origin main
            git reset --hard origin/main

            if [ -d bm-api ] && [ -f bm-api/artisan ]; then
              echo "Deploying Laravel API"
              cd /mnt/home-storage/home/pmsa/apps/bm/bm-api
              mkdir -p storage/logs storage/framework/cache storage/framework/sessions storage/framework/views bootstrap/cache
              chown -R pmsa:pmsa storage bootstrap/cache || true
              chmod -R ug+rwX storage bootstrap/cache || true
              if [ -f composer.json ]; then
                composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction
              fi
              php artisan optimize:clear || true
              php artisan migrate --force
              php artisan optimize || true
            fi

            cd /mnt/home-storage/home/pmsa/apps/bm/bm-mobile
            node scripts/add-screen-numbers.js || true
            node scripts/manager-registration-ui.js || true
            node scripts/screen4-expenses-header.js || true

            lsof -ti:8084 | xargs -r kill -9 || true

            BROWSER=none EXPO_NO_TELEMETRY=1 REACT_NATIVE_PACKAGER_HOSTNAME=bm.pm.sa \
            XDG_CACHE_HOME=/home/pmsa/apps/.cache \
            TMPDIR=/home/pmsa/apps/.tmp \
            TMP=/home/pmsa/apps/.tmp \
            TEMP=/home/pmsa/apps/.tmp \
            nohup npx expo start --clear --go --host lan --port 8084 \
            > /home/pmsa/apps/bm-expo-8084.log 2>&1 &

            sleep 3
            lsof -iTCP:8084 -sTCP:LISTEN || true
            exit 0
