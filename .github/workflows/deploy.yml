name: Deploy BM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BM_SSH_HOST }}
          username: ${{ secrets.BM_SSH_USER }}
          key: ${{ secrets.BM_SSH_PRIVATE_KEY }}
          port: "${{ secrets.BM_SSH_PORT }}"
          script: |
            set -e
            cd /mnt/home-storage/home/pmsa/apps/bm
            git fetch origin main
            git reset --hard origin/main
            cd bm-mobile
            node scripts/add-screen-numbers.js || true
            node scripts/group-expenses-screen.js || true
            (pkill -f "8084|expo|metro" || true) >/dev/null 2>&1

            BROWSER=none EXPO_NO_TELEMETRY=1 REACT_NATIVE_PACKAGER_HOSTNAME=bm.pm.sa \
            XDG_CACHE_HOME=/home/pmsa/apps/.cache \
            TMPDIR=/home/pmsa/apps/.tmp \
            TMP=/home/pmsa/apps/.tmp \
            TEMP=/home/pmsa/apps/.tmp \
            nohup npx expo start --clear --go --host lan --port 8084 \
            > /home/pmsa/apps/bm-expo-8084.log 2>&1 &

            exit 0
