name: Patch owner actions compact cards and header

on:
  push:
    branches: [main]
    paths:
      - 'bm-mobile/scripts/owner-actions-menu.js'
      - 'bm-mobile/scripts/compact-owner-cards.js'
      - 'bm-mobile/scripts/header-owners-title.js'
      - '.github/workflows/patch-owner-actions.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply owner actions menu patch
        run: node bm-mobile/scripts/owner-actions-menu.js
      - name: Apply compact owner cards patch
        run: node bm-mobile/scripts/compact-owner-cards.js
      - name: Apply screen 001 header title patch
        run: node bm-mobile/scripts/header-owners-title.js
      - name: Commit App.js changes
        run: |
          if git diff --quiet bm-mobile/App.js; then
            echo "No App.js changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bm-mobile/App.js
          git commit -m "Apply screen 001 header title to App.js"
          git push
